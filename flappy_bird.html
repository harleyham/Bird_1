<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone - Parallax</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #70c5ce;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            border: 2px solid #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #70c5ce;
        }
        #ui {
            position: absolute;
            width: 320px;
            height: 480px;
            pointer-events: none;
            text-align: center;
        }
        #resetBtn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            background: #f7e61c;
            border: 2px solid #000;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: auto;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <button id="resetBtn">ZERAR RECORDE</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const resetBtn = document.getElementById('resetBtn');

        // Configurações do Canvas
        canvas.width = 320;
        canvas.height = 480;

        // Constantes do Jogo
        const GRAVITY = 0.25;
        const JUMP = -4.5;
        const PIPE_SPEED = 2;
        const PIPE_SPAWN_RATE = 90; // frames
        const PIPE_GAP = 100;
        const PIPE_WIDTH = 50;

        // Estado do Jogo
        let bird = { x: 50, y: 200, v: 0, radius: 12 };
        let pipes = [];
        let mountains = [];
        let score = 0;
        let highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;
        let frameCount = 0;
        let gameState = 'START'; // START, PLAYING, GAMEOVER

        // Event Listener para o Botão de Reset
        resetBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Impede que o clique chegue ao canvas
            highScore = 0;
            localStorage.removeItem('flappyHighScore');
        });

        // Inicializar Montanhas (Paralaxe)

        function initMountains() {
            mountains = [];
            // Camada 1 (mais longe, mais lenta)
            for (let i = 0; i < 3; i++) {
                mountains.push({
                    x: i * canvas.width,
                    width: canvas.width,
                    height: 150,
                    speed: 0.5,
                    color: '#4a7a7c'
                });
            }
            // Camada 2 (mais perto, mais rápida)
            for (let i = 0; i < 3; i++) {
                mountains.push({
                    x: i * canvas.width,
                    width: canvas.width,
                    height: 80,
                    speed: 1.2,
                    color: '#2d5a5d'
                });
            }
        }

        function resetGame() {
            bird = { x: 50, y: 200, v: 0, radius: 12 };
            pipes = [];
            score = 0;
            frameCount = 0;
            gameState = 'PLAYING';
            initMountains();
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            
            // Rotação baseada na velocidade
            const rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.v * 0.1));
            ctx.rotate(rotation);

            // Corpo (Elipse)
            ctx.fillStyle = '#f7e61c';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.radius * 1.2, bird.radius, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Asa batendo
            const flapAngle = Math.sin(frameCount * 0.4) * 0.6;
            ctx.fillStyle = '#f7e61c';
            ctx.beginPath();
            ctx.ellipse(-5, 0, bird.radius * 0.8, bird.radius * 0.5, flapAngle, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Olho
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(6, -4, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(8, -4, 2, 0, Math.PI * 2);
            ctx.fill();

            // Bico
            ctx.fillStyle = 'orange';
            ctx.beginPath();
            ctx.moveTo(10, -2);
            ctx.lineTo(18, 2);
            ctx.lineTo(10, 6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawMountains() {
            mountains.forEach(m => {
                ctx.fillStyle = m.color;
                ctx.beginPath();
                ctx.moveTo(m.x, canvas.height);
                ctx.lineTo(m.x + m.width / 2, canvas.height - m.height);
                ctx.lineTo(m.x + m.width, canvas.height);
                ctx.fill();

                // Move a montanha
                m.x -= m.speed;
                if (m.x + m.width < 0) {
                    m.x = canvas.width;
                }
            });
        }

        function drawPipes() {
            pipes.forEach(p => {
                const rimHeight = 20;
                const rimWidth = PIPE_WIDTH + 6;

                // Cano de cima
                const topPipeY = 0;
                const topPipeH = p.top;
                const gradTop = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
                gradTop.addColorStop(0, '#558b2f');
                gradTop.addColorStop(0.3, '#73bf2e');
                gradTop.addColorStop(0.5, '#a2e64e');
                gradTop.addColorStop(0.7, '#73bf2e');
                gradTop.addColorStop(1, '#558b2f');

                ctx.fillStyle = gradTop;
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.fillRect(p.x, topPipeY, PIPE_WIDTH, topPipeH);
                ctx.strokeRect(p.x, topPipeY, PIPE_WIDTH, topPipeH);
                
                // Aba do cano de cima
                ctx.fillRect(p.x - 3, topPipeH - rimHeight, rimWidth, rimHeight);
                ctx.strokeRect(p.x - 3, topPipeH - rimHeight, rimWidth, rimHeight);

                // Cano de baixo
                const bottomPipeY = p.top + PIPE_GAP;
                const bottomPipeH = canvas.height - bottomPipeY;
                const gradBottom = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
                gradBottom.addColorStop(0, '#558b2f');
                gradBottom.addColorStop(0.3, '#73bf2e');
                gradBottom.addColorStop(0.5, '#a2e64e');
                gradBottom.addColorStop(0.7, '#73bf2e');
                gradBottom.addColorStop(1, '#558b2f');

                ctx.fillStyle = gradBottom;
                ctx.fillRect(p.x, bottomPipeY, PIPE_WIDTH, bottomPipeH);
                ctx.strokeRect(p.x, bottomPipeY, PIPE_WIDTH, bottomPipeH);
                
                // Aba do cano de baixo
                ctx.fillRect(p.x - 3, bottomPipeY, rimWidth, rimHeight);
                ctx.strokeRect(p.x - 3, bottomPipeY, rimWidth, rimHeight);
            });
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Gravidade
            bird.v += GRAVITY;
            bird.y += bird.v;

            // Colisão chão/teto
            if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
                gameState = 'GAMEOVER';
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('flappyHighScore', highScore);
                }
            }

            // Pipes
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                const top = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                pipes.push({ x: canvas.width, top: top, passed: false });
            }

            pipes.forEach((p, index) => {
                p.x -= PIPE_SPEED;

                // Colisão com canos
                if (
                    bird.x + bird.radius > p.x &&
                    bird.x - bird.radius < p.x + PIPE_WIDTH &&
                    (bird.y - bird.radius < p.top || bird.y + bird.radius > p.top + PIPE_GAP)
                ) {
                    gameState = 'GAMEOVER';
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('flappyHighScore', highScore);
                    }
                }

                // Pontuação
                if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
                    score++;
                    p.passed = true;
                }

                // Remove canos fora da tela
                if (p.x + PIPE_WIDTH < 0) {
                    pipes.splice(index, 1);
                }
            });

            frameCount++;
        }

        function draw() {
            // Limpa tela (fundo)
            ctx.fillStyle = '#70c5ce';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawMountains();
            drawPipes();
            drawBird();

            // Score UI
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 4;
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(score, canvas.width / 2, 60);
            ctx.fillText(score, canvas.width / 2, 60);

            // High Score UI
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'right';
            ctx.strokeText(`Recorde: ${highScore}`, canvas.width - 10, 25);
            ctx.fillText(`Recorde: ${highScore}`, canvas.width - 10, 25);
            
            // Reset alignment for subsequent draws
            ctx.textAlign = 'center';

            if (gameState === 'START' || gameState === 'GAMEOVER') {
                resetBtn.style.display = 'block';
            } else {
                resetBtn.style.display = 'none';
            }

            if (gameState === 'START') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.fillText('CLIQUE PARA COMEÇAR', canvas.width / 2, canvas.height / 2);
            }

            if (gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px Arial';
                ctx.fillText('CLIQUE PARA REINICIAR', canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function handleInput() {
            if (gameState === 'START') {
                resetGame();
            } else if (gameState === 'PLAYING') {
                bird.v = JUMP;
            } else if (gameState === 'GAMEOVER') {
                resetGame();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') handleInput();
        });
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        }, {passive: false});

        initMountains();
        loop();
    </script>
</body>
</html>
