<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Clone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }
  canvas {
    border: 4px solid #000;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing
const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

// Game states
const STATE = { TITLE: 0, PLAYING: 1, GAME_OVER: 2 };
let gameState = STATE.TITLE;

// Bird properties
let bird = { x: 80, y: H / 2, vy: 0, size: 30, rotation: 0 };
const GRAVITY = 0.45;
const FLAP_POWER = -7.5;
const BIRD_SPEED_X = 0; // bird stays in place, world scrolls

// Pipe properties
let pipes = [];
const PIPE_WIDTH = 60;
const PIPE_GAP = 155;
const PIPE_INTERVAL = 2800; // ms between new pipes
const PIPE_SPEED = 3;
const MOUNTAIN_FAR_SPEED_MULT = 0.3;
const MOUNTAIN_NEAR_SPEED_MULT = 0.6;
let lastPipeTime = 0;
let pipeIdCounter = 0;

// Ground
const GROUND_HEIGHT = 80;
let groundX = 0;

// Score
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappy_best')) || 0;

// Colors matching original game
const COLORS = {
  sky1: '#4ec0ca',
  sky2: '#2895c7',
  pipeGreen: '#73bf2e',
  pipeDark: '#558b2f',
  pipeHighlight: '#8bc34a',
  pipeBorder: '#2e7d32',
  ground: '#ded895',
  groundDark: '#d2b04c',
  birdYellow: '#f5c842',
  birdOrange: '#e6a817',
  birdWhite: '#ffffff',
  birdRed: '#ff5722',
  birdRed: '#ff5722',
  textWhite: '#ffffff',
  textStroke: '#000000',
  mountainFar: '#a0c4d1',
  mountainNear: '#7da3b1',
};

// Floating clouds for background
let clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({
    x: Math.random() * W,
    y: Math.random() * (H - GROUND_HEIGHT - 200) + 30,
    w: 60 + Math.random() * 80,
    speed: 0.3 + Math.random() * 0.5
  });
}

// Mountains for parallax background
const mountains = {
  far: [],
  near: []
};

function initMountains() {
  mountains.far = [];
  mountains.near = [];
  for (let i = 0; i < 3; i++) {
    const peakCount = 2 + Math.floor(Math.random() * 2);
    const farW = 250 + Math.random() * 150;
    const farSeg = farW / peakCount;
    const peaks = [];
    for (let p = 0; p < peakCount; p++) {
      peaks.push(150 + Math.random() * 100);
    }
    mountains.far.push({ x: i * W, w: farW, peaks });

    const nearPeakCount = 2 + Math.floor(Math.random() * 2);
    const nearW = 200 + Math.random() * 100;
    const nearSeg = nearW / nearPeakCount;
    const nearPeaks = [];
    for (let p = 0; p < nearPeakCount; p++) {
      nearPeaks.push(100 + Math.random() * 80);
    }
    mountains.near.push({ x: i * W - farW / 3, w: nearW, peaks: nearPeaks });
  }
}
initMountains();

// Particles for ground hit effect
let particles = [];

// Flash overlay for death
let flashAlpha = 0;

// Title animation
let titleBirdY = H / 2 - 60;
let titleTime = 0;
let titleScoreBlink = false;
let titleBlinkTimer = 0;

// Colors for medals
function getMedal(score) {
  if (score >= 40) return '#e5c100'; // Gold
  if (score >= 30) return '#c0c0c0'; // Silver
  if (score >= 20) return '#cd7f32'; // Bronze
  return null;
}

// ---- Drawing Functions ----

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_HEIGHT);
  grad.addColorStop(0, '#4ec0ca');
  grad.addColorStop(1, '#72d4de');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_HEIGHT);
}

function drawClouds(dt) {
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  clouds.forEach(c => {
    drawCloud(c.x, c.y, c.w);
    if (gameState === STATE.PLAYING) c.x -= c.speed;
    if (c.x + c.w < 0) { c.x = W + 20; c.y = Math.random() * (H - GROUND_HEIGHT - 200) + 30; }
  });
}

function drawCloud(x, y, w) {
  const h = w * 0.45;
  ctx.beginPath();
  ctx.arc(x + w*0.3, y, h*0.45, 0, Math.PI*2);
  ctx.arc(x + w*0.6, y - h*0.15, h*0.55, 0, Math.PI*2);
  ctx.arc(x + w*0.8, y + h*0.05, h*0.4, 0, Math.PI*2);
  ctx.fill();
}

function drawMountains(dt) {
  const scrollSpeed = gameState === STATE.PLAYING ? PIPE_SPEED : 0;

  for (const m of mountains.far) {
    const dx = -scrollSpeed * MOUNTAIN_FAR_SPEED_MULT;
    m.x += dx;
    if (m.x + m.w < -100) m.x += 3 * W + 250;
    drawMountainShape(m, COLORS.mountainFar);
  }

  for (const m of mountains.near) {
    const dx = -scrollSpeed * MOUNTAIN_NEAR_SPEED_MULT;
    m.x += dx;
    if (m.x + m.w < -100) m.x += 3 * W + 250;
    drawMountainShape(m, COLORS.mountainNear);

    let maxH = 0, maxIdx = 0;
    for (let i = 0; i < m.peaks.length; i++) {
      if (m.peaks[i] > maxH) { maxH = m.peaks[i]; maxIdx = i; }
    }
    const peakX = m.x + (m.w / m.peaks.length) * maxIdx + (m.w / m.peaks.length) / 2;
    const peakY = H - GROUND_HEIGHT - maxH;
    if (peakY > 30 && maxH > 80) {
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      const snowBottom = peakY + maxH * 0.15;
      ctx.moveTo(peakX, peakY);
      ctx.lineTo(peakX - m.w*0.1, snowBottom);
      ctx.lineTo(peakX - m.w*0.02, peakY + maxH*0.1);
      ctx.lineTo(peakX, peakY + maxH*0.13);
      ctx.lineTo(peakX + m.w*0.05, peakY + maxH*0.11);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawMountainShape(m, color) {
  const baseY = H - GROUND_HEIGHT;
  ctx.fillStyle = color;
  ctx.beginPath();
  
  for (let i = 0; i < m.peaks.length; i++) {
    const segW = m.w / m.peaks.length;
    const segStartX = m.x + segW * i;
    const peakH = m.peaks[i];
    const px = segStartX + segW / 2;
    
    // Start from bottom-left of segment, up to peak, down to bottom-right
    ctx.lineTo(segStartX, baseY);
    ctx.lineTo(px, baseY - peakH);
  }
  
  ctx.lineTo(m.x + m.w, baseY);
  ctx.closePath();
  ctx.fill();
}

function drawGround(dt) {
  // Top strip pattern
  const stripeW = 24;
  ctx.fillStyle = COLORS.groundDark;
  ctx.fillRect(0, H - GROUND_HEIGHT, W, 3);

  // Main ground
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, H - GROUND_HEIGHT + 3, W, GROUND_HEIGHT - 3);

  // Scrolling stripe pattern on top
  ctx.fillStyle = COLORS.groundDark;
  if (gameState === STATE.PLAYING) groundX -= PIPE_SPEED;
  const offsetX = ((groundX % stripeW) + stripeW) % stripeW;
  for (let x = -stripeW + offsetX; x < W + stripeW; x += stripeW) {
    ctx.beginPath();
    ctx.moveTo(x, H - GROUND_HEIGHT + 3);
    ctx.lineTo(x + stripeW/2, H - GROUND_HEIGHT + 18);
    ctx.lineTo(x - stripeW/2, H - GROUND_HEIGHT + 18);
    ctx.closePath();
    ctx.fill();
  }

  // Darker bottom area
  ctx.fillStyle = '#c4a638';
  ctx.fillRect(0, H - 25, W, 25);
}

function drawBird(x, y, rotation) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  // Wing (behind body)
  ctx.fillStyle = COLORS.birdOrange;
  ctx.beginPath();
  ctx.ellipse(-4, 2, 12, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = COLORS.birdYellow;
  ctx.beginPath();
  ctx.ellipse(0, 0, 15, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#c8960a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Wing (front)
  ctx.fillStyle = COLORS.birdOrange;
  ctx.beginPath();
  ctx.ellipse(-6, 4, 10, 6, -0.2 + Math.sin(Date.now() * 0.02) * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye white
  ctx.fillStyle = COLORS.birdWhite;
  ctx.beginPath();
  ctx.arc(7, -5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(9, -4, 3, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(10, -5.5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = COLORS.birdRed;
  ctx.beginPath();
  ctx.moveTo(12, 0);
  ctx.lineTo(24, 2);
  ctx.lineTo(12, 5);
  ctx.closePath();
  ctx.fill();

  // Lower beak
  ctx.fillStyle = '#e88a3c';
  ctx.beginPath();
  ctx.moveTo(12, 3);
  ctx.lineTo(22, 4);
  ctx.lineTo(12, 6);
  ctx.closePath();
  ctx.fill();

  // Belly highlight
  ctx.fillStyle = 'rgba(255,255,200,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, 4, 9, 6, 0.1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPipe(pipe) {
  const topH = pipe.topHeight;
  const bottomY = topH + PIPE_GAP;
  const capH = 30;
  const capExtra = 8;

  // Top pipe body
  let grad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
  grad.addColorStop(0, COLORS.pipeGreen);
  grad.addColorStop(0.2, COLORS.pipeHighlight);
  grad.addColorStop(0.5, COLORS.pipeGreen);
  grad.addColorStop(1, COLORS.pipeDark);
  ctx.fillStyle = grad;
  ctx.fillRect(pipe.x, 0, PIPE_WIDTH, topH);

  // Top pipe cap
  ctx.fillStyle = grad;
  ctx.fillRect(pipe.x - capExtra, topH - capH, PIPE_WIDTH + capExtra*2, capH);
  ctx.strokeStyle = '#1b5e20';
  ctx.lineWidth = 2;
  ctx.strokeRect(pipe.x - capExtra, topH - capH, PIPE_WIDTH + capExtra*2, capH);
  ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, topH - capH);

  // Bottom pipe body
  grad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
  grad.addColorStop(0, COLORS.pipeGreen);
  grad.addColorStop(0.2, COLORS.pipeHighlight);
  grad.addColorStop(0.5, COLORS.pipeGreen);
  grad.addColorStop(1, COLORS.pipeDark);
  ctx.fillStyle = grad;
  ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, H - GROUND_HEIGHT - bottomY);

  // Bottom pipe cap
  ctx.fillStyle = grad;
  ctx.fillRect(pipe.x - capExtra, bottomY, PIPE_WIDTH + capExtra*2, capH);
  ctx.strokeStyle = '#1b5e20';
  ctx.lineWidth = 2;
  ctx.strokeRect(pipe.x - capExtra, bottomY, PIPE_WIDTH + capExtra*2, capH);
  ctx.strokeRect(pipe.x, bottomY + capH, PIPE_WIDTH, H - GROUND_HEIGHT - bottomY - capH);

  // Pipe cap highlight line
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(pipe.x + 8, topH - capH + 4);
  ctx.lineTo(pipe.x + 8, topH - 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pipe.x + 8, bottomY + capH + 4);
  ctx.lineTo(pipe.x + 8, H - GROUND_HEIGHT - 6);
  ctx.stroke();
}

function drawScore(s) {
  const text = s.toString();
  ctx.save();
  ctx.font = 'bold 50px Arial';
  ctx.textAlign = 'center';
  ctx.lineWidth = 5;
  ctx.strokeStyle = COLORS.textStroke;
  ctx.strokeText(text, W/2, 80);
  ctx.fillStyle = COLORS.textWhite;
  ctx.fillText(text, W/2, 80);
  // Inner highlight
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.strokeText(text, W/2, 79);
  ctx.restore();
}

function drawTitleScreen(dt) {
  drawSky();
  drawClouds(dt);
  drawGround(dt);

  titleTime += dt;
  titleBirdY = H/2 - 60 + Math.sin(titleTime * 3) * 15;

  // "Flappy Bird" title with shadow and stroke
  ctx.save();
  const titleSize = 44;
  ctx.font = `bold ${titleSize}px Arial`;
  ctx.textAlign = 'center';

  // Shadow
  ctx.fillStyle = '#8B6914';
  ctx.fillText('Flappy Bird', W/2 + 3, H/2 - 107 + 3);
  // Main text
  ctx.fillStyle = COLORS.birdYellow;
  ctx.fillText('Flappy Bird', W/2, H/2 - 107);
  // Stroke
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#5a4008';
  ctx.strokeText('Flappy Bird', W/2, H/2 - 107);

  ctx.restore();

  // Floating bird
  drawBird(W/2, titleBirdY, Math.sin(titleTime * 3) * 0.15);

  // "Tap or press Space" prompt with blinking
  titleBlinkTimer += dt;
  if (titleBlinkTimer > 0.5) titleScoreBlink = !titleScoreBlink;
  if (titleScoreBlink) {
    ctx.save();
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = COLORS.textWhite;
    ctx.lineWidth = 3;
    ctx.strokeStyle = COLORS.textStroke;
    ctx.fillText('Press SPACE or tap to start', W/2, H/2 + 80);
    ctx.strokeText('Press SPACE or tap to start', W/2, H/2 + 80);
    ctx.restore();
  }
}

function drawGameOver(dt) {
  // Darken overlay
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, W, H);

  drawClouds(dt);

  // Score panel (centered box)
  const panelW = 280;
  const panelH = 200;
  const panelX = (W - panelW) / 2;
  const panelY = (H - panelH) / 2 - 30;

  // Panel shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, panelX + 4, panelY + 4, panelW, panelH, 12, true);

  // Panel background
  ctx.fillStyle = '#DEB654';
  roundRect(ctx, panelX, panelY, panelW, panelH, 12, true);
  ctx.strokeStyle = '#5a3e00';
  ctx.lineWidth = 3;
  roundRect(ctx, panelX, panelY, panelW, panelH, 12, false, true);

  // Inner lighter area
  ctx.fillStyle = '#c4973a';
  roundRect(ctx, panelX + 20, panelY + 50, panelW - 40, panelH - 120, 8, true);

  // "Game Over" text
  ctx.save();
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#5a3e00';
  ctx.fillText('Game Over', W/2, panelY + 38);
  ctx.strokeText('Game Over', W/2, panelY + 38);
  ctx.restore();

  // Score label
  ctx.save();
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText('Score', panelX + 30, panelY + 75);
  ctx.fillText('Best', panelX + 30, panelY + 125);
  ctx.restore();

  // Score value
  ctx.save();
  ctx.font = 'bold 26px Arial';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#333';
  ctx.fillText(score.toString(), panelX + panelW - 30, panelY + 78);
  ctx.strokeText(score.toString(), panelX + panelW - 30, panelY + 78);
  ctx.fillText(bestScore.toString(), panelX + panelW - 30, panelY + 128);
  ctx.strokeText(bestScore.toString(), panelX + panelW - 30, panelY + 128);
  ctx.restore();

  // Medal
  const medal = getMedal(score);
  if (medal) {
    const medalX = panelX + 65;
    const medalY = panelY + 85;
    const medalR = 18;
    ctx.fillStyle = medal;
    ctx.beginPath();
    ctx.arc(medalX, medalY, medalR, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Star in medal
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    drawStar(ctx, medalX, medalY, 5, medalR * 0.6, medalR * 0.25);
  }

  // New badge
  if (score === bestScore && score > 0) {
    ctx.save();
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 2;
    ctx.fillText('NEW', panelX + panelW - 36, panelY + 115);
    ctx.strokeText('NEW', panelX + panelW - 36, panelY + 115);
    ctx.restore();
  }

  // Gold border around score area if new record
  if (score === bestScore && score > 0) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    roundRect(ctx, panelX + 20, panelY + 50, panelW - 40, 38, 8, false, true);
  }

  // Restart button
  const btnW = 150;
  const btnH = 46;
  const btnX = (W - btnW) / 2;
  const btnY = panelY + panelH + 30;

  ctx.fillStyle = '#78bf2f';
  roundRect(ctx, btnX, btnY, btnW, btnH, 8, true);
  ctx.strokeStyle = '#4a8a1a';
  ctx.lineWidth = 2;
  roundRect(ctx, btnX, btnY, btnW, btnH, 8, false, true);

  ctx.save();
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#3a6b14';
  ctx.lineWidth = 2;
  ctx.fillText('Restart', W/2, btnY + 30);
  ctx.strokeText('Restart', W/2, btnY + 30);
  ctx.restore();

  // "or press SPACE/tap" hint
  if (flashAlpha <= 0) {
    ctx.save();
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Press SPACE or tap to restart', W/2, btnY + btnH + 30);
    ctx.restore();
  }
}

function drawStar(ctx, cx, cy, points, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI / points) - Math.PI/2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  if (fill === undefined) fill = false;
  if (stroke === undefined) stroke = false;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// ---- Particle system for death ----
function spawnParticles(x, y) {
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 8 - 2,
      life: 1,
      size: 3 + Math.random() * 4,
      color: ['#f5c842','#e6a817','#ff5722','#fff'][Math.floor(Math.random()*4)]
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 15 * dt;
    p.life -= dt * 2.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ---- Game Logic ----

function flap() {
  if (gameState === STATE.TITLE) {
    startGame();
  } else if (gameState === STATE.PLAYING) {
    bird.vy = FLAP_POWER;
  } else if (gameState === STATE.GAME_OVER && flashAlpha <= 0) {
    resetGame();
  }
}

function startGame() {
  gameState = STATE.PLAYING;
  pipes = [];
  score = 0;
  bird.y = H / 2 - 50;
  bird.vy = FLAP_POWER;
  lastPipeTime = performance.now();
  particles = [];
}

function resetGame() {
  gameState = STATE.TITLE;
  bird.x = W / 2;
  bird.y = H / 2 - 60;
  bird.vy = 0;
  bird.rotation = 0;
  pipes = [];
  particles = [];
}

function spawnPipe() {
  const minTop = 80;
  const maxTop = H - GROUND_HEIGHT - PIPE_GAP - 80;
  const topHeight = minTop + Math.random() * (maxTop - minTop);
  pipes.push({
    x: W + 10,
    topHeight: topHeight,
    scored: false,
    id: pipeIdCounter++
  });
}

function checkCollision() {
  const bx = bird.x;
  const by = bird.y;
  const br = 12; // collision radius (slightly smaller than visual)

  // Ground collision
  if (by + br >= H - GROUND_HEIGHT) {
    return true;
  }

  // Ceiling
  if (by - br <= 0) {
    bird.y = br;
    bird.vy = 0;
    return false;
  }

  // Pipe collision
  for (const pipe of pipes) {
    const px = pipe.x;
    const py = pipe.topHeight;
    const pbx = pipe.x + PIPE_WIDTH;
    const pby = py + PIPE_GAP;

    if (bx + br > px && bx - br < pbx) {
      if (by - br < py || by + br > pby) {
        return true;
      }
    }
  }
  return false;
}

// ---- Main Loop ----

let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  ctx.clearRect(0, 0, W, H);

  if (gameState === STATE.TITLE) {
    drawTitleScreen(dt);
  } else {
    // Play state and game over share the same world rendering
  drawSky();
  drawClouds(dt);
  drawMountains(dt);

  // Pipes
    pipes.forEach(pipe => drawPipe(pipe));

    // Ground on top of pipes
    drawGround(dt);

    // Bird
    if (gameState === STATE.PLAYING) {
      bird.vy += GRAVITY;
      bird.y += bird.vy;
      targetRotation();
      groundX -= PIPE_SPEED;
    }
    drawBird(bird.x, bird.y, bird.rotation);

    // Score
    if (gameState === STATE.PLAYING) {
      drawScore(score);

      // Spawn pipes
      if (now - lastPipeTime > PIPE_INTERVAL) {
        spawnPipe();
        lastPipeTime = now;
      }

      // Move pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= PIPE_SPEED;

        // Score when passing
        if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bird.x) {
          pipes[i].scored = true;
          score++;
        }

        // Remove off-screen
        if (pipes[i].x + PIPE_WIDTH + 20 < 0) {
          pipes.splice(i, 1);
        }
      }

      // Collision
      if (checkCollision()) {
        gameState = STATE.GAME_OVER;
        flashAlpha = 1.5;
        spawnParticles(bird.x, bird.y);
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('flappy_best', bestScore.toString());
        }
      }
    } else {
      // Game over state: still draw world but slow ground scroll
      drawGround(dt);
      drawGameOver(dt);
    }

    // Flash effect
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(255,255,255,${Math.min(flashAlpha, 1)})`;
      ctx.fillRect(0, 0, W, H);
      flashAlpha -= dt * 6;
    }

    // Particles
    updateParticles(dt);
    drawParticles();
  }

  requestAnimationFrame(gameLoop);
}

function targetRotation() {
  const target = Math.min(bird.vy * 4, 70) * (Math.PI / 180);
  // Smooth rotation toward target
  bird.rotation += (target - bird.rotation) * 0.3;
}

// ---- Input ----

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    flap();
  }
});

canvas.addEventListener('click', (e) => {
  e.preventDefault();
  flap();
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  flap();
}, { passive: false });

// Start loop
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
