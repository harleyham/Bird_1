<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Clone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }
  canvas {
    display: block;
    border: 2px solid #333;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

// Game constants
const GRAVITY = 0.45;
const FLAP_FORCE = -7.5;
const PIPE_WIDTH = 60;
const PIPE_GAP = 150;
const PIPE_SPEED = 2.5;
const PIPE_INTERVAL = 1600;
const GROUND_HEIGHT = 80;
const BIRD_SIZE = 24;

// Game state
let gameState = 'ready'; // ready, playing, dead
let bird, pipes, score, bestScore, groundX, lastPipeTime, frameCount;

// Parallax layers
const layers = [];
const numMountains = 12;

function initLayers() {
  layers.length = 0;
  // Far mountains - slowest
  layers.push({
    speed: 0.3,
    color: '#5B8C5A',
    peaks: generatePeaks(numMountains, 120, 200),
    yBase: H - GROUND_HEIGHT - 50,
    alpha: 0.7
  });
  // Mid mountains
  layers.push({
    speed: 0.6,
    color: '#4A7A49',
    peaks: generatePeaks(numMountains + 2, 80, 160),
    yBase: H - GROUND_HEIGHT - 30,
    alpha: 0.85
  });
  // Near mountains
  layers.push({
    speed: 1.0,
    color: '#3D6B3C',
    peaks: generatePeaks(numMountains + 4, 50, 120),
    yBase: H - GROUND_HEIGHT,
    alpha: 1.0
  });
}

function generatePeaks(count, minH, maxH) {
  const peaks = [];
  const spacing = W * 1.5;
  for (let i = -2; i < count; i++) {
    peaks.push({
      x: i * spacing + Math.random() * spacing * 0.5,
      height: minH + Math.random() * (maxH - minH),
      width: spacing * (0.6 + Math.random() * 0.4)
    });
  }
  return peaks;
}

function initGame() {
  bird = {
    x: W / 2 - 40,
    y: H / 2 - 50,
    vy: 0,
    rotation: 0,
    flapFrame: 0,
    wingUp: true
  };
  pipes = [];
  score = 0;
  bestScore = parseInt(localStorage.getItem('flappyBest') || '0');
  groundX = 0;
  lastPipeTime = 0;
  frameCount = 0;
  initLayers();
}

function flap() {
  if (gameState === 'ready') {
    gameState = 'playing';
    bird.vy = FLAP_FORCE;
  } else if (gameState === 'playing') {
    bird.vy = FLAP_FORCE;
  } else if (gameState === 'dead') {
    if (frameCount > 30) {
      gameState = 'ready';
      initGame();
    }
  }
}

// Input handling
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    flap();
  }
});

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });

function spawnPipe() {
  const minY = 80;
  const maxY = H - GROUND_HEIGHT - PIPE_GAP - 80;
  const topH = minY + Math.random() * (maxY - minY);
  pipes.push({
    x: W + 10,
    topH: topH,
    scored: false
  });
}

function update() {
  frameCount++;

  // Ground scroll
  if (gameState !== 'dead') {
    groundX -= PIPE_SPEED;
    if (groundX <= -24) groundX = 0;
  }

  // Parallax
  for (const layer of layers) {
    const speed = layer.speed * (gameState === 'dead' ? 0 : PIPE_SPEED);
    for (const peak of layer.peaks) {
      peak.x -= speed;
    }
    // Rebuild peaks that go off screen
    const minPX = Math.min(...layer.peaks.map(p => p.x));
    const maxPX = Math.max(...layer.peaks.map(p => p.x));
    const spacing = W * 1.5;
    if (maxPX < -100) {
      const first = layer.peaks.shift();
      layer.peaks.push({
        x: maxPX + spacing + Math.random() * spacing * 0.3,
        height: first.height,
        width: first.width
      });
    }
  }

  if (gameState === 'ready') {
    bird.y = H / 2 - 50 + Math.sin(frameCount * 0.05) * 8;
    bird.wingUp = Math.sin(frameCount * 0.15) > 0;
    return;
  }

  if (gameState === 'dead') return;

  // Bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.min(Math.max(bird.vy * 3, -30), 70);
  bird.flapFrame++;
  bird.wingUp = Math.sin(bird.flapFrame * 0.3) > 0;

  // Spawn pipes
  if (frameCount % Math.round(PIPE_INTERVAL / 16) === 0) {
    spawnPipe();
  }

  // Update pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= PIPE_SPEED;
    if (pipes[i].x < -PIPE_WIDTH) {
      pipes.splice(i, 1);
      continue;
    }
    // Score
    if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bird.x) {
      pipes[i].scored = true;
      score++;
    }
  }

  // Collision - ground
  if (bird.y + BIRD_SIZE / 2 >= H - GROUND_HEIGHT) {
    die();
    return;
  }
  // Collision - ceiling
  if (bird.y - BIRD_SIZE / 2 <= 0) {
    bird.y = BIRD_SIZE / 2;
    bird.vy = 0;
  }

  // Collision - pipes
  const bx = bird.x - BIRD_SIZE / 2 + 4;
  const by = bird.y - BIRD_SIZE / 2 + 4;
  const bw = BIRD_SIZE - 8;
  const bh = BIRD_SIZE - 8;

  for (const pipe of pipes) {
    const px = pipe.x;
    // Top pipe
    if (rectCollision(bx, by, bw, bh, px, 0, PIPE_WIDTH, pipe.topH)) {
      die();
      return;
    }
    // Bottom pipe
    const botY = pipe.topH + PIPE_GAP;
    if (rectCollision(bx, by, bw, bh, px, botY, PIPE_WIDTH, H - botY - GROUND_HEIGHT)) {
      die();
      return;
    }
  }
}

function rectCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

function die() {
  gameState = 'dead';
  frameCount = 0;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('flappyBest', bestScore.toString());
  }
}

// Drawing
function draw() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H - GROUND_HEIGHT);
  skyGrad.addColorStop(0, '#4EC0CA');
  skyGrad.addColorStop(0.6, '#71C8D4');
  skyGrad.addColorStop(1, '#D4F0E7');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H - GROUND_HEIGHT);

  // Clouds
  drawClouds();

  // Parallax mountains
  for (const layer of layers) {
    drawMountainLayer(layer);
  }

  // Ground
  drawGround();

  // Pipes
  for (const pipe of pipes) {
    drawPipe(pipe);
  }

  // Bird
  drawBird();

  // UI
  if (gameState === 'ready') {
    drawReady();
  } else if (gameState === 'playing') {
    drawScore();
  } else if (gameState === 'dead') {
    drawScore();
    drawGameOver();
  }
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const clouds = [
    { x: 50, y: 60, s: 1.0 },
    { x: 200, y: 100, s: 0.7 },
    { x: 320, y: 45, s: 0.85 },
    { x: 140, y: 140, s: 0.6 },
    { x: 370, y: 120, s: 0.5 }
  ];
  for (const c of clouds) {
    const cx = (c.x + frameCount * 0.15) % (W + 100) - 50;
    ctx.beginPath();
    ctx.arc(cx, c.y, 18 * c.s, 0, Math.PI * 2);
    ctx.arc(cx + 18 * c.s, c.y - 5, 22 * c.s, 0, Math.PI * 2);
    ctx.arc(cx + 38 * c.s, c.y, 16 * c.s, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawMountainLayer(layer) {
  ctx.save();
  ctx.globalAlpha = layer.alpha;
  ctx.fillStyle = layer.color;

  for (const peak of layer.peaks) {
    const px = peak.x;
    const py = layer.yBase;
    ctx.beginPath();
    ctx.moveTo(px - peak.width / 2, py);
    ctx.lineTo(px, py - peak.height);
    ctx.lineTo(px + peak.width / 2, py);
    ctx.closePath();
    ctx.fill();

    // Snow cap
    if (peak.height > 140) {
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(px - peak.width * 0.1, py - peak.height * 0.6);
      ctx.lineTo(px, py - peak.height);
      ctx.lineTo(px + peak.width * 0.1, py - peak.height * 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = layer.color;
      ctx.globalAlpha = layer.alpha;
    }
  }
  ctx.restore();
}

function drawGround() {
  // Main ground
  ctx.fillStyle = '#DED895';
  ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);

  // Ground top border
  ctx.fillStyle = '#54AC40';
  ctx.fillRect(0, H - GROUND_HEIGHT, W, 15);

  // Ground pattern
  ctx.fillStyle = '#C9B45E';
  for (let i = groundX; i < W + 24; i += 24) {
    ctx.fillRect(i, H - GROUND_HEIGHT + 15, 12, 8);
    ctx.fillRect(i + 12, H - GROUND_HEIGHT + 28, 12, 8);
  }
}

function drawPipe(pipe) {
  const botY = pipe.topH + PIPE_GAP;

  // Top pipe
  drawPipeBody(pipe.x, 0, PIPE_WIDTH, pipe.topH);
  // Bottom pipe
  drawPipeBody(pipe.x, botY, PIPE_WIDTH, H - botY - GROUND_HEIGHT);

  // Pipe rims
  drawPipeRim(pipe.x, pipe.topH - 5, PIPE_WIDTH, 25);
  drawPipeRim(pipe.x, botY - 20, PIPE_WIDTH, 25);
}

function drawPipeBody(x, y, w, h) {
  const grad = ctx.createLinearGradient(x, y, x + w, y);
  grad.addColorStop(0, '#5A8A2A');
  grad.addColorStop(0.2, '#73BF2E');
  grad.addColorStop(0.5, '#85D638');
  grad.addColorStop(0.8, '#73BF2E');
  grad.addColorStop(1, '#5A8A2A');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // Pipe border
  ctx.strokeStyle = '#3D5C1C';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
}

function drawPipeRim(x, y, w, h) {
  const margin = 4;
  const grad = ctx.createLinearGradient(x + margin, y, x + w - margin, y);
  grad.addColorStop(0, '#5A8A2A');
  grad.addColorStop(0.2, '#73BF2E');
  grad.addColorStop(0.5, '#92E842');
  grad.addColorStop(0.8, '#73BF2E');
  grad.addColorStop(1, '#5A8A2A');
  ctx.fillStyle = grad;
  ctx.fillRect(x + margin, y, w - margin * 2, h);
  ctx.strokeStyle = '#3D5C1C';
  ctx.lineWidth = 2;
  ctx.strokeRect(x + margin, y, w - margin * 2, h);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation * Math.PI / 180);

  // Body
  const bodyGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, BIRD_SIZE / 2);
  bodyGrad.addColorStop(0, '#F5E742');
  bodyGrad.addColorStop(1, '#E8C81E');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(0, 0, BIRD_SIZE / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#B8960A';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Wing
  ctx.fillStyle = '#F0D020';
  ctx.strokeStyle = '#B8960A';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const wingY = bird.wingUp ? -6 : 2;
  ctx.ellipse(-4, wingY, 10, 6, bird.wingUp ? -0.4 : 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Eye (white)
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(6, -5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pupil
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(8, -5, 3, 0, Math.PI * 2);
  ctx.fill();

  // Pupil highlight
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(9, -6, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#F47B20';
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(18, 2);
  ctx.lineTo(10, 6);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#C05A0A';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Beak line
  ctx.strokeStyle = '#C05A0A';
  ctx.beginPath();
  ctx.moveTo(10, 3);
  ctx.lineTo(17, 2);
  ctx.stroke();

  ctx.restore();
}

function drawScore() {
  ctx.save();
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#000';
  ctx.strokeText(score, W / 2, 60);
  ctx.fillStyle = '#FFF';
  ctx.fillText(score, W / 2, 60);
  ctx.restore();
}

function drawReady() {
  ctx.save();
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#000';
  ctx.strokeText('Flappy Bird', W / 2, H / 2 - 100);
  ctx.fillStyle = '#FFF';
  ctx.fillText('Flappy Bird', W / 2, H / 2 - 100);

  ctx.font = 'bold 20px Arial';
  ctx.strokeText('Clique ou pressione Espaço', W / 2, H / 2 + 30);
  ctx.fillStyle = '#FFF';
  ctx.fillText('Clique ou pressione Espaço', W / 2, H / 2 + 30);

  if (bestScore > 0) {
    ctx.font = 'bold 18px Arial';
    ctx.strokeText('Melhor: ' + bestScore, W / 2, H / 2 + 60);
    ctx.fillStyle = '#FFD700';
    ctx.fillText('Melhor: ' + bestScore, W / 2, H / 2 + 60);
  }
  ctx.restore();
}

function drawGameOver() {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  const panelW = 260;
  const panelH = 180;
  const px = (W - panelW) / 2;
  const py = (H - panelH) / 2 - 20;

  ctx.fillStyle = '#DEB050';
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 4;
  roundRect(px, py, panelW, panelH, 10);

  ctx.fillStyle = '#F5E7C8';
  roundRect(px + 12, py + 12, panelW - 24, panelH - 24, 6);

  // Title
  ctx.font = 'bold 34px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#D63031';
  ctx.fillText('Game Over', W / 2, py + 50);

  // Score
  ctx.font = 'bold 20px Arial';
  ctx.fillStyle = '#333';
  ctx.fillText('Pontuação: ' + score, W / 2, py + 85);

  // Best
  ctx.fillStyle = '#8B6914';
  ctx.fillText('Melhor: ' + bestScore, W / 2, py + 115);

  // Medal
  if (score >= 10) {
    const medalColor = score >= 40 ? '#FFD700' : score >= 20 ? '#C0C0C0' : '#CD7F32';
    ctx.fillStyle = medalColor;
    ctx.beginPath();
    ctx.arc(px + 45, py + 75, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 12px Arial';
    ctx.fillText('★', px + 45, py + 79);
  }

  // Restart hint
  ctx.font = 'bold 18px Arial';
  ctx.fillStyle = '#FFF';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText('Clique para reiniciar', W / 2, py + panelH + 40);
  ctx.fillText('Clique para reiniciar', W / 2, py + panelH + 40);

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// Game loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();
</script>
</body>
</html>
